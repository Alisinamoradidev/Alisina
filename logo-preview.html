<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Primenest Reality — Logo Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0f172a;padding:60px 20px;min-height:100vh;display:flex;flex-direction:column;align-items:center}
h1{margin-bottom:8px;color:#f1f5f9;font-size:28px;letter-spacing:-0.5px}
.sub{color:#94a3b8;margin-bottom:48px;font-size:15px}
.logo-card{background:#1e293b;border-radius:24px;padding:48px 56px;box-shadow:0 8px 32px rgba(0,0,0,0.4);text-align:center;border:2px solid #334155}
.previews{display:flex;gap:24px;margin-top:36px;justify-content:center}
.preview-box{border-radius:14px;padding:20px 28px;display:flex;align-items:center;gap:14px}
.dark{background:#0f172a;border:1px solid #334155}
.light{background:#f8fafc;border:1px solid #e2e8f0}
.dark span{color:#f1f5f9;font-size:19px;font-weight:700;letter-spacing:-0.3px}
.light span{color:#1e293b;font-size:19px;font-size:19px;font-weight:700;letter-spacing:-0.3px}
.label{margin-top:32px;font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
</style>
</head>
<body>

<h1>Primenest Reality</h1>
<p class="sub">Logo preview — approve to deploy</p>

<div class="logo-card">

  <!-- Main logo -->
  <img src="images/logo.jpeg" alt="Primenest Reality" width="160" height="160" style="border-radius:24px;object-fit:cover">

  <p class="label">Header preview</p>

  <div class="previews">
    <div class="preview-box dark">
      <img src="images/logo.jpeg" alt="Primenest Reality" width="32" height="32" style="border-radius:6px;object-fit:cover">
      <span>Primenest Reality</span>
    </div>
    <div class="preview-box light">
      <img src="images/logo.jpeg" alt="Primenest Reality" width="32" height="32" style="border-radius:6px;object-fit:cover">
      <span>Primenest Reality</span>
    </div>
  </div>

</div>

</body>
</html>
